trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: "22.x"
  backendImage: "ai-service-desk-backend"
  frontendImage: "ai-service-desk-frontend"
  mastraImage: "ai-service-desk-mastra"

stages:
  - stage: verify
    displayName: Verify
    jobs:
      - job: build_test
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
          - script: npm ci
            displayName: Install dependencies
          - script: npm run build
            displayName: TypeScript and frontend build
          - script: npm run test
            displayName: Backend tests

  - stage: containerize
    displayName: Build containers
    dependsOn: verify
    jobs:
      - job: docker_build
        steps:
          - task: Docker@2
            displayName: Build backend image
            inputs:
              command: buildAndPush
              containerRegistry: "$(ACR_SERVICE_CONNECTION)"
              Dockerfile: backend/Dockerfile
              repository: "$(backendImage)"
              tags: "$(Build.BuildId)"
          - task: Docker@2
            displayName: Build frontend image
            inputs:
              command: buildAndPush
              containerRegistry: "$(ACR_SERVICE_CONNECTION)"
              Dockerfile: frontend/Dockerfile
              repository: "$(frontendImage)"
              tags: "$(Build.BuildId)"
          - task: Docker@2
            displayName: Build Mastra Studio image
            inputs:
              command: buildAndPush
              containerRegistry: "$(ACR_SERVICE_CONNECTION)"
              Dockerfile: backend/Dockerfile.mastra
              repository: "$(mastraImage)"
              tags: "$(Build.BuildId)"

  - stage: deploy
    displayName: Deploy manifests
    dependsOn: containerize
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: aks
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    kubectl create secret generic ai-service-desk-secrets \
                      --from-literal=googleGenerativeAiApiKey="$(GOOGLE_GENERATIVE_AI_API_KEY)" \
                      --from-literal=xaiApiKey="$(XAI_API_KEY)" \
                      --from-literal=kvRestApiUrl="$(KV_REST_API_URL)" \
                      --from-literal=kvRestApiToken="$(KV_REST_API_TOKEN)" \
                      --from-literal=authBootstrapAdminPassword="$(AUTH_BOOTSTRAP_ADMIN_PASSWORD)" \
                      --from-literal=authTestRequesterPassword="$(AUTH_TEST_REQUESTER_PASSWORD)" \
                      --from-literal=apiKeys="$(API_KEYS)" \
                      --dry-run=client -o yaml | kubectl apply -f -
                    kubectl apply -f infra/k8s/platform-config.yaml
                    for manifest in \
                      infra/k8s/backend-deployment.yaml \
                      infra/k8s/frontend-deployment.yaml \
                      infra/k8s/mastra-studio-deployment.yaml; do
                      perl -pe 's/\$\(ACR_NAME\)/$ENV{ACR_NAME}/g; s/\$\(Build\.BuildId\)/$ENV{BUILD_BUILDID}/g' "$manifest" | kubectl apply -f -
                    done
                  displayName: Apply Kubernetes manifests
                  env:
                    ACR_NAME: $(ACR_NAME)
                    BUILD_BUILDID: $(Build.BuildId)
