apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-desk-config
data:
  frontendOrigin: "https://service-desk.example.com"
  authBootstrapAdminEmail: "admin@empresa.local"
  authTestRequesterEmail: "solicitante.teste@empresa.local"
  authSessionTtlSeconds: "28800"
  aiProvider: "google"
  googleGenerativeAiModel: "gemini-2.5-flash"
  googleGenerativeAiFallbackModels: "gemini-2.5-flash-lite,gemini-2.0-flash"
  googleEmbeddingModel: "gemini-embedding-001"
  xaiModelCascade: "grok-4-1-fast-non-reasoning,grok-4-fast-non-reasoning,grok-3-mini,grok-3"
  embeddingDimension: "64"
  ticketStorage: "redis"
  ticketRedisPrefix: "ai-service-desk"
  ticketSeedSampleData: "false"
  qdrantUrl: "http://qdrant.ai-platform.svc.cluster.local:6333"
