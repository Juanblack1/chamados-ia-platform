apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service-desk-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service-desk-backend
  template:
    metadata:
      labels:
        app: ai-service-desk-backend
    spec:
      containers:
        - name: backend
          image: $(ACR_NAME).azurecr.io/ai-service-desk-backend:$(Build.BuildId)
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: frontendOrigin
            - name: AI_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: aiProvider
            - name: GOOGLE_GENERATIVE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-desk-secrets
                  key: googleGenerativeAiApiKey
            - name: GOOGLE_GENERATIVE_AI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: googleGenerativeAiModel
            - name: GOOGLE_EMBEDDING_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: googleEmbeddingModel
            - name: EMBEDDING_DIMENSION
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: embeddingDimension
            - name: TICKET_STORAGE
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: ticketStorage
            - name: TICKET_REDIS_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: ticketRedisPrefix
            - name: KV_REST_API_URL
              valueFrom:
                secretKeyRef:
                  name: ai-service-desk-secrets
                  key: kvRestApiUrl
            - name: KV_REST_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-service-desk-secrets
                  key: kvRestApiToken
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: ai-service-desk-secrets
                  key: apiKeys
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-desk-config
                  key: qdrantUrl
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service-desk-backend
spec:
  selector:
    app: ai-service-desk-backend
  ports:
    - port: 80
      targetPort: 4000
